interface:
  display_name: "Conversation to Linear"
  short_description: "Sync clean, non-duplicate conversation outcomes into Linear"
  default_prompt: "Use $conversation-to-linear to extract only explicit, stack-realistic, non-duplicate items from the current thread or an explicitly requested recent-history window. Dedupe against both Linear target projects, prefer updating an existing issue over creating a sibling duplicate, and rewrite any created or extended issue into a shorter execution shape with explicit work type, current fact pattern, action, and boundaries. Do not frame analytics spikes or verification tasks as confirmed implementation bugs without proof."
